name: Daily Stream Message

on:
  schedule:
    - cron: '0 16 * * *'  # runs daily at 16:00 UTC (adjust this)
  workflow_dispatch: # lets you run it manually too

jobs:
  send-message:
    runs-on: ubuntu-latest

    steps:
      - name: Send webhook message
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d '{"content": "🎮 Today on stream: Stardew Valley + Mods 🌱✨ Come vibe!"}' \
          YOUR_WEBHOOK_URL
