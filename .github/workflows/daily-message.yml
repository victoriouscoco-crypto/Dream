name: Daily Webhook Post

on:
  schedule:
    - cron: '0 9 * * *'  
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Send webhook message
        run: |
          content=$(cat message.txt)

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{\"content\": \"${content}\"}" \
          ${{ secrets.TEST }}
