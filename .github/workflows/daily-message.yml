name: Daily Discord Post

on:
  schedule:
    - cron: '0 9 * * *'   
  workflow_dispatch:       # manual test button

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Read message
        id: msg
        run: |
          echo "content<<EOF" >> $GITHUB_OUTPUT
          cat message.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send to Discord webhook
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{\"content\": \"${{ message.txt }}\"}" \
          ${{ secrets.WEBHOOK_URL }}
